# render.yaml — Render deployment configuration for STEMQuest backend
# Documentation: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: stemquest-backend
    runtime: python
    region: oregon          # Choose the region nearest to your users
    plan: free              # Free tier — good for student projects!
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: FRONTEND_URL
        value: https://YOUR-APP-NAME.vercel.app   # ← Update this after Vercel deploy
